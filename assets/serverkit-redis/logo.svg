<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc382c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b82318;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b1a0f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#redisGrad)" filter="url(#shadow)"/>
  
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  
  <!-- Redis "R" letter -->
  <text x="100" y="115" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">R</text>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="160" r="8" fill="white" opacity="0.9"/>
  <circle cx="75" cy="150" r="5" fill="white" opacity="0.6"/>
  <circle cx="125" cy="150" r="5" fill="white" opacity="0.6"/>
  
  <!-- Speed lines -->
  <line x1="30" y1="100" x2="55" y2="100" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="145" y1="100" x2="170" y2="100" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="30" x2="100" y2="55" stroke="white" stroke-width="2" opacity="0.4"/>
</svg>
